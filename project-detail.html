<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Project details - Fabio Doria Portfolio">
    <!-- Favicon -->
    <link rel="icon" href="./image/logo.ico" type="image/x-icon">
    <!-- Styles -->
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/9fc1af3224.js" crossorigin="anonymous"></script>
    <title id="page-title">Project Details - Fabio Doria</title>
</head>

<body class="gradient-bg">
    <!-- HEADER -->
    <header class="fixed top-0 z-40 w-full flex justify-between items-center py-5 px-5 md:px-8 bg-black/30 backdrop-blur-[10px] shadow-md">
        <!-- Logo -->
        <a href="./index.html" class="flex gap-2 items-center">
            <span class="text-white font-bold text-2xl">Fabio</span>
            <span class="text-[#FF0642] font-bold text-2xl">Doria</span>
        </a>

        <!-- Back Button -->
        <a href="./index.html#projects" class="flex items-center gap-2 text-white hover:text-[#FF0642] transition-colors duration-300 font-semibold">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Projects</span>
        </a>
    </header>

    <!-- PROJECT DETAIL SECTION -->
    <section class="min-h-screen pt-24 px-8 md:px-20 pb-16">
        <div class="max-w-6xl mx-auto">
            <!-- Project Header -->
            <div class="text-center mb-12">
                <h1 id="project-title" class="text-4xl md:text-5xl font-bold gradient-text text-shadow-md/30 text-shadow-black mb-4"></h1>
                <p id="project-description" class="text-xl text-white/80 max-w-3xl mx-auto"></p>
            </div>

            <!-- Project Image -->
            <div class="mb-12 rounded-xl overflow-hidden shadow-2xl shadow-[#FF0642]/20 max-w-xl mx-auto">
                <img id="project-image" src="" alt="" class="w-full h-auto object-cover">
            </div>

            <!-- Project Details Grid -->
            <div class="grid md:grid-cols-2 gap-8 mb-12">
                <!-- Detailed Description -->
                <div class="bg-white/5 rounded-xl backdrop-blur-sm p-6 hover:bg-white/10 transition-all duration-300">
                    <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-info-circle text-[#FF0642]"></i>
                        About the Project
                    </h2>
                    <p id="detailed-description" class="text-white/80 leading-7"></p>
                </div>

                <!-- Technologies Used -->
                <div class="bg-white/5 rounded-xl backdrop-blur-sm p-6 hover:bg-white/10 transition-all duration-300">
                    <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-code text-[#FF0642]"></i>
                        Technologies Used
                    </h2>
                    <div id="technologies-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <!-- Features -->
            <div class="bg-white/5 rounded-xl backdrop-blur-sm p-6 hover:bg-white/10 transition-all duration-300 mb-8">
                <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-[#FF0642]"></i>
                    Key Features
                </h2>
                <ul id="features-list" class="grid md:grid-cols-2 gap-3"></ul>
            </div>

            <!-- Links -->
            <div class="flex flex-wrap justify-center gap-4">
                <a id="github-link" href="#" target="_blank" class="hidden items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                    <i class="fa-brands fa-github"></i>
                    View on GitHub
                </a>
                <a id="live-link" href="#" target="_blank" class="hidden items-center gap-2 bg-[#FF0642] hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                    <i class="fa-solid fa-external-link-alt"></i>
                    View Live Demo
                </a>
                <a href="./index.html#projects" class="flex items-center gap-2 border-2 border-white hover:bg-white hover:text-[#222245] text-white font-bold py-3 px-6 rounded-lg transition duration-300">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to All Projects
                </a>
            </div>
        </div>
    </section>

    <footer class="flex flex-col gap-2 items-center justify-center py-8 bg-black/30 backdrop-blur-[10px] text-white/80 text-center">
        <ul class="flex justify-center gap-10 text-[12px] md:text-[16px]">
            <li>
                <a href="https://www.linkedin.com/in/fabio-doria-6957b8371/" target="_blank"
                    class="text-white hover:text-[#FF0642] transition-colors duration-300">
                    LinkedIn
                </a>
            </li>
            <li>
                <a href="https://github.com/DoriaFabio" target="_blank" class="text-white hover:text-[#FF0642] transition-colors duration-300">
                    GitHub
                </a>
            </li>
            <li>
                <a href="https://www.instagram.com/fabio_.doria/" target="_blank" class="text-white hover:text-[#FF0642] transition-colors duration-300">
                    Instagram
                </a>
            </li>
            <li>
                <a href="./privacy.html" target="_blank"
                    class="text-white hover:text-[#FF0642] transition-colors duration-300">
                    Privacy Policy
                </a>
            </li>
        </ul>
        <p class="md:text-[14px] text-[12px]">© 2026 Fabio Doria. All right reserved</p>
    </footer>

    <script src="./project-detail.js"></script>
</body>

</html>
